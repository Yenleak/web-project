<div class="workspace-container">
  <div class="workspace-header">
    <h1>Воркспейсы</h1>
    <button (click)="showForm = !showForm">+ Новый воркспейс</button>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="workspace-form" *ngIf="showForm">
    <input [(ngModel)]="newWorkspace.name" name="name" placeholder="Название воркспейса" />
    <input [(ngModel)]="newWorkspace.deadline" name="deadline" type="date" />
    <button (click)="createWorkspace()">Создать</button>
    <button (click)="showForm = false">Отмена</button>
  </div>

  <div class="workspace-list">
    @for (ws of workspaces; track ws.id) {
      <div class="workspace-card" [class.overdue]="isOverdue(ws.deadline)" (click)="openWorkspace(ws.id)">
        <div class="ws-top">
          <h3>{{ ws.name }}</h3>
          <span class="overdue-badge" *ngIf="isOverdue(ws.deadline)">⚠️ Просрочено</span>
        </div>
        <p>👤 Создатель: {{ ws.creator.name }}</p>
        <p>👥 Участников: {{ ws.members.length }}</p>
        <p *ngIf="ws.deadline">📅 Дедлайн: {{ ws.deadline }}</p>
      </div>
    } @empty {
      <div class="empty-state">
        <p>Воркспейсов нет. Создайте первый!</p>
      </div>
    }
  </div>
</div>
